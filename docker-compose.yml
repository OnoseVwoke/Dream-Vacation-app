services:

  db:
    image: postgres:16

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d

    networks:
      - vacation-network

  backend:
    build:
      context: ./backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - db

    networks:
      - vacation-network

  frontend:
    build:
      context: ./frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    networks:
      - vacation-network

volumes:
  postgres_data:

networks:
  vacation-network:
    driver: bridge